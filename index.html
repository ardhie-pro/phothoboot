      :root {

      body {

      .glass-card {

        background: linear-gradient(135deg, #D48C12 0%, #B4730A 100%);

        box-shadow: 0 10px 20px -5px rgba(212, 140, 18, 0.4);
      }
      @keyframes sway {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(5deg); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
      }
      @keyframes flash-anim {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }
      .animate-sway { animation: sway 4s ease-in-out infinite; transform-origin: top center; }
      .animate-float { animation: float 6s ease-in-out infinite; }
      .flash-active { animation: flash-anim 0.3s ease-out; }
      #frame-overlay {
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect x="2" y="2" width="96" height="96" fill="none" stroke="%23D48C12" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/></svg>');
      }
      .custom-scrollbar::-webkit-scrollbar { width: 8px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: var(--ramadan-green); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--ramadan-gold); border-radius: 10px; }
    </style>
